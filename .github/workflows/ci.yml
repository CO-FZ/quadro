name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  integration:
    name: Integration Tests (Camada 2)
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: http://127.0.0.1:54321
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with: { version: latest }

      - name: Start Supabase local
        run: supabase start

      - name: Export Supabase keys
        # supabase status -o env outputs ANON_KEY=... and SERVICE_ROLE_KEY=...
        # Rename to the names the integration fixture expects.
        run: |
          supabase status -o env \
            | grep -E '^(ANON_KEY|SERVICE_ROLE_KEY)=' \
            | sed 's/^ANON_KEY=/SUPABASE_ANON_KEY=/' \
            | sed 's/^SERVICE_ROLE_KEY=/SUPABASE_SERVICE_ROLE_KEY=/' \
            >> $GITHUB_ENV

      - name: Reset DB and seed
        run: supabase db reset

      - name: Run integration tests
        run: pnpm test:integration

  db:
    name: pgTAP Tests (Camada 4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with: { version: latest }

      - name: Start Supabase local
        run: supabase start

      - name: Reset DB
        run: supabase db reset

      - name: Enable pgTAP extension
        # Use psql directly — avoids CLI version differences (db execute removed in v2)
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:54322/postgres \
            -c "CREATE EXTENSION IF NOT EXISTS pgtap;"

      - name: Run pgTAP tests
        run: pnpm test:db

  e2e:
    name: E2E Tests (Camada 3)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      PLAYWRIGHT_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with: { version: latest }

      - name: Start Supabase local
        run: supabase start

      - name: Export Supabase keys
        run: |
          supabase status -o env \
            | grep -E '^(ANON_KEY|SERVICE_ROLE_KEY)=' \
            | sed 's/^ANON_KEY=/SUPABASE_ANON_KEY=/' \
            | sed 's/^SERVICE_ROLE_KEY=/SUPABASE_SERVICE_ROLE_KEY=/' \
            >> $GITHUB_ENV

      - name: Reset DB and seed
        run: supabase db reset

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Next.js
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}

      - name: Upload screenshot diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/e2e/snapshots/
          retention-days: 7
